name: app CI

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run typecheck

      - run: bun test
