name: app CI

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SUMOPOD_API_KEY: ci-placeholder-key
      SUMOPOD_BASE_URL: https://ai.sumopod.com/v1
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - name: Seed financial_ratios fixture
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f tests/fixtures/seed-financial-ratios.sql

      - name: Apply chat_threads/chat_messages migration
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f drizzle/0000_careful_husk.sql

      - name: Apply index_summary migration
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f drizzle/0001_worried_mathemanic.sql

      - name: Apply daily_trade_summary migration
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f drizzle/0002_classy_catseye.sql

      - name: Apply market_news migration
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f drizzle/0003_aromatic_talkback.sql

      - run: bun run lint

      - run: bun run typecheck

      - run: bun test
